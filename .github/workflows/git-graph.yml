name: Update Git Graph

on:
  push:
    branches:
      - main

jobs:
  update-graph:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate graph
        run: node generateGraph.js

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add graph.md
          git commit -m "Update git graph"
          git push