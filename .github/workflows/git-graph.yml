name: Update Git Graph (Gitgraph)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm init -y
          npm install @gitgraph/js canvas

      - name: Generate graph image
        run: |
          cat << 'EOF' > generate.js
          const fs = require("fs");
          const { createCanvas } = require("canvas");
          const { GitgraphCore, templateExtend } = require("@gitgraph/js");

          const canvas = createCanvas(1200, 800);
          const ctx = canvas.getContext("2d");

          const gitgraph = new GitgraphCore({
            canvas: ctx,
            template: templateExtend("metro", {}),
          });

          const main = gitgraph.branch("main");
          main.commit("Start");

          const feature = main.branch("feature");
          feature.commit("Feature work");

          main.merge(feature);

          const buffer = canvas.toBuffer("image/png");
          fs.writeFileSync("graph.png", buffer);
          EOF

          node generate.js

      - name: Push to graph branch
        run: |
          git clone --depth=1 --branch graph https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph-branch || \
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph-branch

          cp graph.png graph-branch/
          cd graph-branch

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add graph.png
          git commit -m "Update git graph" || echo "No changes"
          git push
