name: Update Git Graph

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-graph:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout full repo history
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Generate git graph text
      - name: Generate graph text
        run: |
          git log --all --graph --pretty=format:'%h - %s (%cr)' --abbrev-commit > graph.txt

      # 3. Convert to image
      - name: Convert to image
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          convert -background white -fill black -font Courier -pointsize 14 text:graph.txt graph.png

      # 4. Push to graph branch
      - name: Push to graph branch
        run: |
          git clone --depth=1 --branch graph https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph-branch || \
          git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph-branch

          cd graph-branch

          git checkout graph || git checkout -b graph

          cp ../graph.png .

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add graph.png
          git commit -m "Update git graph" || echo "No changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph
