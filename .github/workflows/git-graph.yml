name: Update Git Graph (Gource)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-graph:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout full history
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Install dependencies
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gource ffmpeg imagemagick

      # 3. Generate visualization
      - name: Generate graph
        run: |
          gource \
            --seconds-per-day 0.2 \
            --auto-skip-seconds 1 \
            --hide filenames \
            --background-color 000000 \
            --resolution 1280x720 \
            --output-ppm-stream - \
          | ffmpeg -y -r 60 -f image2pipe -vcodec ppm -i - \
            -vcodec libx264 -pix_fmt yuv420p graph.mp4

      # 4. Convert to GIF (README friendly)
      - name: Convert to GIF
        run: |
          ffmpeg -i graph.mp4 -vf "fps=10,scale=800:-1:flags=lanczos" graph.gif

      # 5. Push to graph branch
      - name: Push to graph branch
        run: |
          git clone --depth=1 --branch graph https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph-branch || \
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph-branch

          cp graph.gif graph-branch/
          cd graph-branch

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add graph.gif
          git commit -m "Update gource graph" || echo "No changes"
          git push
