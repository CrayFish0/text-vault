name: Git Graph Visual

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  graph:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Generate DOT graph
        run: |
          git log --all --pretty=format:'"%h" -> "%p"' | sed 's/ /"; "/g' > graph.dot
          echo "digraph G {" > final.dot
          cat graph.dot >> final.dot
          echo "}" >> final.dot

      - name: Convert to PNG
        run: dot -Tpng final.dot -o graph.png

      - name: Push to graph branch
        run: |
          git clone --depth=1 --branch graph https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph-branch || \
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} graph-branch

          cp graph.png graph-branch/
          cd graph-branch

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add graph.png
          git commit -m "update graph" || echo "no changes"
          git push
